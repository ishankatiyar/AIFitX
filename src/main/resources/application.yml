spring:
  application:
    name: aifitx-backend
  datasource:
    url: ${DB_URL:jdbc:h2:file:./data/aifitx;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  jackson:
    default-property-inclusion: non_null

server:
  port: ${PORT:8080}
  error:
    include-message: never

app:
  jwt:
    secret: ${JWT_SECRET:change-this-development-secret-to-at-least-32-bytes}
    expiration: ${JWT_EXPIRATION:86400000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
